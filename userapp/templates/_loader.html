<div id="loader-wrapper" class="hidden fixed inset-0 z-50 bg-gray-950 flex-col items-center justify-center">

    <!-- Cube animation — pb-16 absorbs downward overflow from keyframes -->
    <div id="cube-scale-outer" class="flex-shrink-0 pb-16">
        <div class="relative" style="height:200px;width:200px;">
            <div class="h1Container" style="position:absolute;inset:0;">
                {% for w in "123" %}{% for l in "123" %}
                <div class="cube h1 w{{ w }} l{{ l }}"><div class="face top"></div><div class="face left"></div><div class="face right"></div></div>
                {% endfor %}{% endfor %}
            </div>
            <div class="h2Container" style="position:absolute;inset:0;">
                {% for w in "123" %}{% for l in "123" %}
                <div class="cube h2 w{{ w }} l{{ l }}"><div class="face top"></div><div class="face left"></div><div class="face right"></div></div>
                {% endfor %}{% endfor %}
            </div>
            <div class="h3Container" style="position:absolute;inset:0;">
                {% for w in "123" %}{% for l in "123" %}
                <div class="cube h3 w{{ w }} l{{ l }}"><div class="face top"></div><div class="face left"></div><div class="face right"></div></div>
                {% endfor %}{% endfor %}
            </div>
        </div>
    </div>

    <!-- Status text -->
    <div class="text-center px-4 w-full max-w-xs">
        <p class="text-blue-300 text-sm sm:text-base font-medium mb-1" data-i18n="lbl_wait">Результаты будут готовы примерно через</p>
        <p class="text-white text-2xl sm:text-3xl font-bold leading-tight">
            <span id="vall">—</span>
            <span class="text-base sm:text-lg font-medium text-blue-200 ml-1" data-i18n="lbl_min">минут</span>
        </p>
        <div class="mt-4 w-52 mx-auto bg-gray-800 rounded-full h-1.5 overflow-hidden">
            <div id="progress-bar" class="relative h-1.5 rounded-full transition-all duration-1000 overflow-hidden" style="width:0%;background:linear-gradient(90deg,#2563eb,#60a5fa)">
                <span class="absolute inset-0 bg-white/20 animate-pulse"></span>
            </div>
        </div>
        <p class="text-gray-500 text-xs mt-3 flex items-center justify-center gap-1.5">
            <span class="w-1.5 h-1.5 rounded-full bg-blue-500 animate-pulse inline-block flex-shrink-0"></span>
            Идёт вычисление...
        </p>
    </div>
</div>
