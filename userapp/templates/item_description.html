{% load static %}
{% if error %}
<div class="p-4 text-sm text-gray-500 dark:text-gray-400">Элемент не найден.</div>
{% else %}
{% with color=item_color|default:"blue" %}
<div class="rounded-2xl border overflow-hidden
    {% if color == 'blue' %}border-blue-200 dark:border-blue-700/50 bg-blue-50/60 dark:bg-blue-900/10
    {% elif color == 'purple' %}border-purple-200 dark:border-purple-700/50 bg-purple-50/60 dark:bg-purple-900/10
    {% elif color == 'green' %}border-green-200 dark:border-green-700/50 bg-green-50/60 dark:bg-green-900/10
    {% else %}border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800{% endif %}">

    <!-- accent stripe -->
    <div class="h-1
        {% if color == 'blue' %}bg-gradient-to-r from-blue-500 to-indigo-500
        {% elif color == 'purple' %}bg-gradient-to-r from-purple-500 to-violet-500
        {% elif color == 'green' %}bg-gradient-to-r from-green-500 to-emerald-500
        {% else %}bg-blue-500{% endif %}">
    </div>

    <div class="p-5">
        <!-- badge + title -->
        <div class="flex items-start gap-3 mb-4">
            <span class="mt-0.5 shrink-0 w-7 h-7 rounded-lg flex items-center justify-center text-xs font-bold
                {% if color == 'blue' %}bg-blue-100 dark:bg-blue-800/60 text-blue-700 dark:text-blue-300
                {% elif color == 'purple' %}bg-purple-100 dark:bg-purple-800/60 text-purple-700 dark:text-purple-300
                {% elif color == 'green' %}bg-green-100 dark:bg-green-800/60 text-green-700 dark:text-green-300
                {% else %}bg-gray-200 dark:bg-gray-700 text-gray-700 dark:text-gray-300{% endif %}">
                {{ item_id }}
            </span>
            <h3 class="text-sm font-semibold text-gray-900 dark:text-white leading-snug">{{ item_name }}</h3>
        </div>

        <!-- description -->
        <p class="text-sm text-gray-600 dark:text-gray-300 leading-relaxed mb-5">{{ item_desc }}</p>

        <!-- actions -->
        <div class="flex flex-wrap gap-2">
            <a href="/answer?options={{ item_id }}"
               class="inline-flex items-center gap-1.5 px-4 py-2 text-sm font-semibold text-white rounded-xl shadow transition-all hover:-translate-y-0.5
                {% if color == 'blue' %}bg-blue-600 hover:bg-blue-500 shadow-blue-500/20
                {% elif color == 'purple' %}bg-purple-600 hover:bg-purple-500 shadow-purple-500/20
                {% elif color == 'green' %}bg-green-600 hover:bg-green-500 shadow-green-500/20
                {% else %}bg-blue-600 hover:bg-blue-500{% endif %}">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                </svg>
                Решить
            </a>
            <a href="{% static item_file %}" target="_blank" rel="noopener"
               class="inline-flex items-center gap-1.5 px-4 py-2 text-sm font-medium rounded-xl border transition-all hover:-translate-y-0.5
                text-gray-700 dark:text-gray-200 border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 hover:bg-gray-50 dark:hover:bg-gray-700">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
                Открыть PDF
            </a>
        </div>
    </div>
</div>
{% endwith %}
{% endif %}
